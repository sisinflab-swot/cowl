name: CI pipeline

on:
  push:
    branches:
      - dev
      - 'dev-*'

env:
  build_dir: build
  config: Release

jobs:
  analyze:
    name: Analyze
    runs-on: ${{vars.ubuntu_runner || 'ubuntu-latest'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          submodules: recursive

      - name: Pre-commit
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install pre-commit
          pre-commit run --from-ref=HEAD~1 --to-ref=HEAD

      - name: Configure
        run: >
          CC=clang cmake -B ${{env.build_dir}}
          -DCOWL_CPP_TESTS=OFF
          -DCOWL_LTO=OFF
          -DCOWL_CLANG_TIDY=ON
          -DCOWL_ENTITY_IDS=ON
          -DCMAKE_COMPILE_WARNING_AS_ERROR=ON

      - name: Build
        run: cmake --build ${{env.build_dir}}

  test:
    name: Test
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ${{vars.ubuntu_runner || 'ubuntu-latest'}}
          - ${{vars.windows_runner || 'windows-latest'}}
          - ${{vars.macos_runner || 'macos-latest'}}
        lib_type: [STATIC, SHARED]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          if [ $RUNNER_OS == 'Windows' ]; then
            choco install winflexbison3
          elif [ $RUNNER_OS == 'macOS' ]; then
            brew install flex bison
            echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH
            echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Configure
        run: >
          cmake -B ${{env.build_dir}}
          -DULIB_LEAKS=ON
          -DULIB_SANITIZERS=ON
          -DULIB_LIBRARY_TYPE=${{matrix.lib_type}}
          -DCOWL_LIBRARY_TYPE=${{matrix.lib_type}}
          -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
          -DCMAKE_SYSTEM_VERSION=''
          -DCMAKE_BUILD_TYPE=${{env.config}}

      - name: Build
        run: cmake --build ${{env.build_dir}} --config ${{env.config}}

      - name: Prepare workdir (Windows)
        working-directory: ${{env.build_dir}}
        if: runner.os == 'Windows'
        run: |
          if [ ${{matrix.lib_type}} == 'SHARED' ]; then
            readarray -d '' dlls < <(find . -path '*/${{env.config}}/*.dll' -print0)
            for exe_dir in test bench examples tools; do
              cp "${dlls[@]}" ${exe_dir}/${{env.config}}
            done
          fi
        shell: bash

      - name: Run
        working-directory: ${{env.build_dir}}
        run: ctest --build-config ${{env.config}} --output-on-failure

  bench:
    name: Benchmark
    runs-on: ${{matrix.os}}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ${{vars.ubuntu_runner || 'ubuntu-latest'}}
          - ${{vars.windows_runner || 'windows-latest'}}
          - ${{vars.macos_runner || 'macos-latest'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          if [ $RUNNER_OS == 'Windows' ]; then
            choco install winflexbison3
          elif [ $RUNNER_OS == 'macOS' ]; then
            brew install flex bison
            echo "$(brew --prefix flex)/bin" >> $GITHUB_PATH
            echo "$(brew --prefix bison)/bin" >> $GITHUB_PATH
          fi
        shell: bash

      - name: Configure
        run: >
          cmake -B ${{env.build_dir}}
          -DULIB_OPTIMIZE_FOR_HOST=ON
          -DCOWL_LTO=ON
          -DCMAKE_SYSTEM_VERSION=''
          -DCMAKE_BUILD_TYPE=${{env.config}}

      - name: Build
        run: cmake --build ${{env.build_dir}} --config ${{env.config}} --target cowl-bench

      - name: Prepare workdir (Windows)
        working-directory: ${{env.build_dir}}/bench
        if: runner.os == 'Windows'
        run: mv ${{env.config}}/*.exe ./
        shell: bash

      - name: Run
        working-directory: ${{env.build_dir}}/bench
        run: ./cowl-bench

  docs:
    name: Documentation
    runs-on: ${{vars.ubuntu_runner || 'ubuntu-latest'}}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        run: |
          sudo apt install doxygen
          python -m venv .venv
          source .venv/bin/activate
          pip install Sphinx sphinx-rtd-theme breathe
          cmake -B ${{env.build_dir}} -DCOWL_DOCS=ON -DCOWL_READERS=OFF -DCOWL_WRITERS=OFF
          cmake --build ${{env.build_dir}} --target cowl-docs
